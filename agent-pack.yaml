# trAIner — Agent Pack (local development)
#
# Asistente personal de entrenamiento físico (personal trainer).
# Este archivo se monta en el contenedor del chatbot vía docker-compose.
# Para despliegue en K8s, el agent pack va embebido en deployment.yaml.
metadata:
  id: trainer-agent
  displayName: trAIner
  description: >-
    trAIner es tu entrenador personal de IA. Te ayuda a planificar rutinas,
    corregir técnica, controlar progreso y mantener hábitos saludables.
    Parte del Reto EAFIT sobre el ecosistema Verana.
  defaultLanguage: es
  tags:
    - fitness
    - personal-trainer
    - health
    - eafit
    - trainer

languages:
