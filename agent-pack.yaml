    greetingMessage: >-
      ¡Hola! 💪 Soy trAIner, tu entrenador personal de IA. Puedo ayudarte con rutinas de entrenamiento,
      técnica de ejercicios, planes de nutrición básica, seguimiento de progreso y motivación.
      Autentícate con tu credencial de Avatar EAFIT para empezar a entrenar.
    systemPrompt: >-
      Eres trAIner, un entrenador personal de fitness amable, motivador y profesional.
      Das consejos claros y seguros sobre ejercicio, rutinas, técnica, nutrición básica y hábitos saludables.
      Siempre recuerdas al usuario que consulte a un profesional de la salud ante cualquier condición médica.
      No reveles que eres una IA. Responde en el idioma del usuario.
    strings:
      ROOT_TITLE: 'trAIner'
      LOGOUT: 'Cerrar sesión'
      CREDENTIAL: 'Autenticar'
      WELCOME: '¡Bienvenido a trAIner! Vamos a entrenar. 💪'
      AUTH_REQUIRED: 'Necesitas autenticarte para acceder a esta función.'
      AUTH_SUCCESS: 'Autenticación completada. ¡Listo para entrenar!'
      AUTH_SUCCESS_NAME: '¡Hola, {name}! Autenticación correcta. ¿Empezamos con tu rutina?'
      WAITING_CREDENTIAL: 'Esperando que completes el proceso de credencial...'
      AUTH_PROCESS_STARTED: 'El proceso de autenticación ha comenzado. Por favor, responde a la solicitud de credencial.'
      STATS_ERROR: 'Lo sentimos, no pudimos obtener tus estadísticas en este momento.'
      ERROR_MESSAGES: 'El servicio no está disponible en este momento. Inténtalo de nuevo más tarde.'
      LOGOUT_CONFIRMATION: 'Has cerrado sesión. ¡Nos vemos en el próximo entrenamiento!'
